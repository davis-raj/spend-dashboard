<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Davis Family - Spend Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; color: #333; padding: 20px; }
.header { text-align: center; margin-bottom: 30px; }
.header h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 5px; }
.header p { color: #666; font-size: 14px; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 30px; }
.stat-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.stat-card .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
.stat-card .sub { font-size: 12px; color: #999; margin-top: 4px; }
.positive { color: #27ae60; } .negative { color: #e74c3c; } .neutral { color: #2c3e50; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
@media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
.card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card h3 { font-size: 16px; color: #1a1a2e; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.card.full { grid-column: 1 / -1; }
canvas { max-height: 300px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; background: #f8f9fa; color: #555; border-bottom: 2px solid #e9ecef; position: sticky; top: 0; }
td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
tr:hover td { background: #f8f9ff; }
.amount { font-weight: 600; text-align: right; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; background: #e8f4fd; color: #2980b9; }
.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: white; }
.filter-bar input { width: 200px; }
.txn-scroll { max-height: 400px; overflow-y: auto; border-radius: 8px; border: 1px solid #e9ecef; }
.sortable { cursor: pointer; user-select: none; } .sortable:hover { color: #2980b9; }
#loading { text-align: center; padding: 60px; font-size: 18px; color: #888; }
.month-btns { display: inline-flex; gap: 4px; flex-wrap: wrap; }
.month-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid #ddd; background: #f8f9fa; font-size: 12px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
.month-btn:hover { background: #e8f4fd; border-color: #2980b9; }
.month-btn.active { background: #2980b9; color: white; border-color: #2980b9; }
</style>
</head>
<body>
<div class="header">
<h1>💰 The Davis Family - Spend Dashboard</h1>
<p>Auto-updated from monthly transaction exports</p>
</div>
<div id="loading">Loading data...</div>
<div id="app" style="display:none;">
<div class="stats-row" id="stats-row"></div>
<div class="grid">
<div class="card full"><h3>📊 Monthly Overview</h3><canvas id="monthlyChart"></canvas></div>
<div class="card"><h3>💵 Income by Category <span class="month-btns" id="incBtns"></span></h3><canvas id="incChart"></canvas></div>
<div class="card"><h3>🏷️ Spending by Category <span class="month-btns" id="catBtns"></span></h3><canvas id="catChart"></canvas></div>
<div class="card full"><h3>📈 Income Trends</h3><div class="month-btns" id="incTrendBtns" style="margin-bottom:12px;"></div><canvas id="incTrendChart"></canvas></div>
<div class="card full"><h3>📈 Spending Trends</h3><div class="month-btns" id="trendCatBtns" style="margin-bottom:12px;"></div><canvas id="trendChart"></canvas></div>
</div>
<div class="card full" style="margin-bottom:30px;">
<h3>🔍 All Transactions</h3>
<div class="filter-bar">
<span class="month-btns" id="txnMonthBtns"></span>
<select id="filterCat"><option value="">All Categories</option></select>
<input type="text" id="filterSearch" placeholder="Search merchant...">
</div>
<div class="txn-scroll"><table><thead><tr><th class="sortable" data-col="Date">Date ↕</th><th class="sortable" data-col="Merchant">Merchant ↕</th><th class="sortable" data-col="Category">Category ↕</th><th class="sortable" data-col="Account">Account ↕</th><th class="sortable amount" data-col="Spend">Amount ↕</th></tr></thead><tbody id="txnBody"></tbody></table></div>
<p id="txnCount" style="margin-top:8px;font-size:12px;color:#888;"></p>
</div>
</div>

<script>
fetch('data.json').then(r => r.json()).then(DATA => {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = '';

  const monthShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function monthLabel(m) { return monthShort[parseInt(m.split('-')[1])-1]; }

  // Create month button group, returns getter function for current value
  function createMonthBtns(containerId, onChange) {
    const container = document.getElementById(containerId);
    const btns = [];
    const currentMonth = DATA.monthly[DATA.monthly.length - 1]?.month || '';
    const ytd = document.createElement('span');
    ytd.className = 'month-btn'; ytd.textContent = 'YTD'; ytd.dataset.value = '';
    container.appendChild(ytd); btns.push(ytd);
    DATA.monthly.forEach(m => {
      const b = document.createElement('span');
      b.className = 'month-btn' + (m.month === currentMonth ? ' active' : ''); b.textContent = monthLabel(m.month); b.dataset.value = m.month;
      container.appendChild(b); btns.push(b);
    });
    let current = currentMonth;
    btns.forEach(b => b.onclick = () => {
      btns.forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      current = b.dataset.value;
      onChange(current);
    });
    onChange(current);
    return () => current;
  }

  const totalExp = DATA.monthly.reduce((s,m) => s + m.expenses, 0);
  const totalInc = DATA.monthly.reduce((s,m) => s + m.income, 0);
  const totalXfer = DATA.monthly.reduce((s,m) => s + (m.transfers||0), 0);
  const avgMonthly = totalExp / DATA.monthly.length;
  const net = totalInc - totalExp;
  const incMonths = DATA.monthly.filter(m=>m.income>0).length || 1;
  const avgInc = totalInc / incMonths;
  const avgNet = avgInc - avgMonthly;
  document.getElementById('stats-row').innerHTML = `
  <div class="stat-card"><div class="label">Total Income</div><div class="value positive">$${totalInc.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sub">${DATA.monthly.filter(m=>m.income>0).length} months recorded</div></div>
  <div class="stat-card"><div class="label">Total Spent</div><div class="value" style="color:#e67e22">$${totalExp.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sub">${DATA.monthly.length} months</div></div>
  <div class="stat-card"><div class="label">Net Cashflow</div><div class="value ${net>=0?'positive':'negative'}">$${net.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sub">${net>=0?'surplus':'deficit'}</div></div>
  <div class="stat-card"><div class="label">Avg Monthly Income</div><div class="value positive">$${avgInc.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sub">per month</div></div>
  <div class="stat-card"><div class="label">Avg Monthly Spend</div><div class="value" style="color:#e67e22">$${avgMonthly.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sub">per month</div></div>
  <div class="stat-card"><div class="label">Avg Monthly Net</div><div class="value ${avgNet>=0?'positive':'negative'}">$${avgNet.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div class="sub">${avgNet>=0?'surplus':'deficit'} per month</div></div>`;

  const months = DATA.monthly.map(m => m.month);
  new Chart(document.getElementById('monthlyChart'), {
    type: 'bar', data: { labels: months.map(m => monthShort[parseInt(m.split('-')[1])-1]), datasets: [
      { label: 'Income', data: DATA.monthly.map(m=>m.income), backgroundColor: '#27ae6088', borderColor: '#27ae60', borderWidth: 1 },
      { label: 'Expenses', data: DATA.monthly.map(m=>m.expenses), backgroundColor: '#e74c3c88', borderColor: '#e74c3c', borderWidth: 1 },
      { label: 'Avg Income', data: DATA.monthly.map(()=>avgInc), type: 'line', borderColor: '#27ae60', borderDash: [6,4], borderWidth: 2, pointRadius: 0, fill: false },
      { label: 'Avg Expenses', data: DATA.monthly.map(()=>avgMonthly), type: 'line', borderColor: '#e74c3c', borderDash: [6,4], borderWidth: 2, pointRadius: 0, fill: false },
    ]}, options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { y: { ticks: { callback: v => '$'+(v/1000).toFixed(0)+'k' } } } }
  });

  const catColors = ['#3498db','#e74c3c','#f39c12','#27ae60','#9b59b6','#1abc9c','#e67e22','#2980b9','#c0392b','#16a085','#8e44ad','#d35400','#2c3e50','#7f8c8d','#f1c40f'];

  // Category donut with buttons
  let catChart = null;
  function renderCatDonut(selMonth) {
    let catData;
    if (!selMonth) { catData = DATA.categories; }
    else {
      const bycat = {};
      DATA.transactions.filter(t => t.Month === selMonth).forEach(t => { bycat[t.Category] = (bycat[t.Category]||0) + t.Spend; });
      catData = Object.entries(bycat).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([name,total])=>({name,total:Math.round(total)}));
    }
    if (catChart) catChart.destroy();
    catChart = new Chart(document.getElementById('catChart'), {
      type: 'doughnut', data: { labels: catData.map(c=>c.name), datasets: [{ data: catData.map(c=>c.total), backgroundColor: catColors }] },
      options: { responsive: true, onClick: (e, els) => { if(els.length) filterByCat(catData[els[0].index].name); }, plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } } }
    });
  }
  let txnMonth = '';
  createMonthBtns('catBtns', (m) => { renderCatDonut(m); txnMonth = m; renderTxns(); });

  // Income by category donut with buttons
  let incChart = null;
  function renderIncDonut(selMonth) {
    let incData;
    if (!selMonth) {
      incData = DATA.incomeCategories;
    } else {
      const bySource = {};
      (DATA.incomeTransactions||[]).filter(t => t.Month === selMonth).forEach(t => { bySource[t.IncomeSource] = (bySource[t.IncomeSource]||0) + t.Amount; });
      incData = Object.entries(bySource).sort((a,b)=>b[1]-a[1]).map(([name,total])=>({name,total:Math.round(total)}));
    }
    if (incChart) incChart.destroy();
    const incColors = ['#2ecc71','#3498db','#9b59b6','#f1c40f','#e67e22','#1abc9c','#e74c3c'];
    incChart = new Chart(document.getElementById('incChart'), {
      type: 'doughnut', data: { labels: incData.map(c=>c.name), datasets: [{ data: incData.map(c=>c.total), backgroundColor: incColors }] },
      options: { responsive: true, onClick: (e, els) => { if(els.length) filterByIncCat(incData[els[0].index].name); }, plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } } }
    });
  }
  createMonthBtns('incBtns', (m) => { renderIncDonut(m); txnMonth = m; renderIncTxns(m); });

  // Trend chart with category toggles
  const allTrendCats = Object.keys(DATA.catByMonth).sort((a,b) => {
    const ta = Object.values(DATA.catByMonth[a]).reduce((s,v)=>s+v,0);
    const tb = Object.values(DATA.catByMonth[b]).reduce((s,v)=>s+v,0);
    return tb - ta;
  });
  const defaultOn = new Set(['Groceries','Shopping','Restaurants & Bars','Gas','Cash & ATM']);
  const activeCats = new Set(defaultOn);
  const trendContainer = document.getElementById('trendCatBtns');
  let trendChart = null;

  const clearBtn = document.createElement('span');
  clearBtn.className = 'month-btn'; clearBtn.textContent = '✕ Clear';
  clearBtn.onclick = () => { activeCats.clear(); trendContainer.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active')); clearBtn.classList.remove('active'); renderTrend(); };
  trendContainer.appendChild(clearBtn);

  allTrendCats.forEach(c => {
    const b = document.createElement('span');
    b.className = 'month-btn' + (activeCats.has(c) ? ' active' : '');
    b.textContent = c;
    b.onclick = () => { if (activeCats.has(c)) { activeCats.delete(c); b.classList.remove('active'); } else { activeCats.add(c); b.classList.add('active'); } renderTrend(); };
    trendContainer.appendChild(b);
  });

  function renderTrend() {
    const cats = [...activeCats];
    const ds = cats.map((c,i) => ({
      label: c, data: DATA.monthly.map(m => (DATA.catByMonth[c]||{})[m.month]||0),
      borderColor: catColors[i % catColors.length], backgroundColor: catColors[i % catColors.length]+'33', fill: true, tension: 0.3,
    }));
    if (trendChart) trendChart.destroy();
    trendChart = new Chart(document.getElementById('trendChart'), {
      type: 'line', data: { labels: months.map(m => monthShort[parseInt(m.split('-')[1])-1]), datasets: ds },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { y: { ticks: { callback: v=>'$'+v } } } }
    });
  }
  renderTrend();

  // Income Trend chart with source toggles
  const incByMonth = DATA.incByMonth || {};
  const allIncSources = Object.keys(incByMonth).sort((a,b) => {
    const ta = Object.values(incByMonth[a]).reduce((s,v)=>s+v,0);
    const tb = Object.values(incByMonth[b]).reduce((s,v)=>s+v,0);
    return tb - ta;
  });
  const activeIncSources = new Set(allIncSources); // all on by default
  const incTrendContainer = document.getElementById('incTrendBtns');
  let incTrendChart = null;
  const incColors = ['#2ecc71','#3498db','#9b59b6','#f1c40f','#e67e22','#1abc9c','#e74c3c','#16a085'];

  const incClearBtn = document.createElement('span');
  incClearBtn.className = 'month-btn'; incClearBtn.textContent = '✕ Clear';
  incClearBtn.onclick = () => { activeIncSources.clear(); incTrendContainer.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active')); incClearBtn.classList.remove('active'); renderIncTrend(); };
  incTrendContainer.appendChild(incClearBtn);

  allIncSources.forEach(src => {
    const b = document.createElement('span');
    b.className = 'month-btn active';
    b.textContent = src;
    b.onclick = () => { if (activeIncSources.has(src)) { activeIncSources.delete(src); b.classList.remove('active'); } else { activeIncSources.add(src); b.classList.add('active'); } renderIncTrend(); };
    incTrendContainer.appendChild(b);
  });

  function renderIncTrend() {
    const sources = [...activeIncSources];
    const ds = sources.map((src,i) => ({
      label: src, data: DATA.monthly.map(m => (incByMonth[src]||{})[m.month]||0),
      borderColor: incColors[i % incColors.length], backgroundColor: incColors[i % incColors.length]+'33', fill: true, tension: 0.3,
    }));
    if (incTrendChart) incTrendChart.destroy();
    incTrendChart = new Chart(document.getElementById('incTrendChart'), {
      type: 'line', data: { labels: months.map(m => monthShort[parseInt(m.split('-')[1])-1]), datasets: ds },
      options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { y: { ticks: { callback: v=>'$'+v.toLocaleString() } } } }
    });
  }
  renderIncTrend();

  // Merchants with buttons
  // All Transactions with buttons
  createMonthBtns('txnMonthBtns', m => { txnMonth = m; renderTxns(); });
  const allCats = [...new Set(DATA.transactions.map(t=>t.Category))].sort();
  const cSel = document.getElementById('filterCat');
  allCats.forEach(c => { const o = document.createElement('option'); o.value=c; o.textContent=c; cSel.appendChild(o); });

  let sortCol = 'Date', sortAsc = false;
  document.querySelectorAll('.sortable').forEach(th => {
    th.onclick = () => {
      const col = th.dataset.col;
      if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = col !== 'Date'; }
      renderTxns();
    };
  });

  window.filterByCat = function(cat) {
    cSel.value = cat;
    renderTxns();
    document.getElementById('filterCat').scrollIntoView({behavior:'smooth'});
  }

  window.filterByMerch = function(merch) {
    cSel.value = '';
    document.getElementById('filterSearch').value = merch;
    renderTxns();
    document.getElementById('filterSearch').scrollIntoView({behavior:'smooth'});
  }

  window.filterByIncCat = function(cat) {
    cSel.value = '';
    document.getElementById('filterSearch').value = '';
    let filtered = (DATA.incomeTransactions||[]).filter(t => t.IncomeSource === cat);
    if (txnMonth) filtered = filtered.filter(t => t.Month === txnMonth);
    filtered.sort((a,b) => b.Date.localeCompare(a.Date));
    const tbody = document.getElementById('txnBody');
    tbody.innerHTML = filtered.map(t => `<tr><td>${t.Date}</td><td>${t.IncomeSource}</td><td>Income</td><td>—</td><td class="positive">+$${t.Amount.toLocaleString(undefined,{minimumFractionDigits:2})}</td></tr>`).join('');
    document.getElementById('txnCount').textContent = `${filtered.length} income transactions`;
    document.getElementById('filterCat').scrollIntoView({behavior:'smooth'});
  }

  function renderIncTxns(month) {
    cSel.value = '';
    document.getElementById('filterSearch').value = '';
    let filtered = (DATA.incomeTransactions||[]);
    if (month) filtered = filtered.filter(t => t.Month === month);
    filtered.sort((a,b) => b.Date.localeCompare(a.Date));
    const total = filtered.reduce((s,t) => s + t.Amount, 0);
    const tbody = document.getElementById('txnBody');
    tbody.innerHTML = filtered.map(t => `<tr><td>${t.Date}</td><td>${t.IncomeSource}</td><td>Income</td><td>—</td><td class="positive">+$${t.Amount.toLocaleString(undefined,{minimumFractionDigits:2})}</td></tr>`).join('');
    document.getElementById('txnCount').textContent = `${filtered.length} income transactions • $${total.toLocaleString(undefined,{maximumFractionDigits:0})} total`;
  }

  function renderTxns() {
    const cat = cSel.value, search = document.getElementById('filterSearch').value.toLowerCase();
    let filtered = DATA.transactions;
    if (txnMonth) filtered = filtered.filter(t => t.Month === txnMonth);
    if (cat) filtered = filtered.filter(t => t.Category === cat);
    if (search) filtered = filtered.filter(t => t.Merchant.toLowerCase().includes(search));
    filtered.sort((a,b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (sortCol === 'Spend') return sortAsc ? va - vb : vb - va;
      return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
    const total = filtered.reduce((s,t) => s+t.Spend, 0);
    document.getElementById('txnBody').innerHTML = filtered.slice(0,200).map(t =>
      `<tr><td>${t.Date}</td><td>${t.Merchant}</td><td><span class="pill">${t.Category}</span></td><td style="font-size:11px;color:#888">${t.Account}</td><td class="amount">$${t.Spend.toFixed(2)}</td></tr>`
    ).join('');
    document.getElementById('txnCount').textContent = `${filtered.length} transactions • $${total.toLocaleString(undefined,{maximumFractionDigits:0})} total`;
  }
  cSel.onchange = document.getElementById('filterSearch').oninput = renderTxns;
  renderTxns();
}).catch(e => { document.getElementById('loading').textContent = 'Error loading data: ' + e; });
</script>
</body>
</html>
